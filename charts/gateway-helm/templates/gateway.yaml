---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: '{{ .Release.Name }}-eg-gw'
  namespace: '{{ .Release.Namespace }}'
spec:
  gatewayClassName: '{{ .Release.Name }}-eg'
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
